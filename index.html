<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>أركيد البلوكات | أيقونات الهزيمة + عملات + قائمة منزل</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f2a, #03050b);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Cairo', system-ui, sans-serif;
      padding: 20px;
    }

    .game-wrapper {
      max-width: 1300px;
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 48px;
      padding: 0 0 20px 0;
      box-shadow: 0 25px 45px rgba(0,0,0,0.5);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #050a14;
      border-radius: 32px;
      box-shadow: 0 12px 28px black;
      cursor: none;
      position: relative;
    }

    /* شريط علوي شفاف */
    .top-stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 16px 20px;
      background: transparent;
      gap: 15px;
      flex-wrap: wrap;
    }

    .stats-group {
      display: flex;
      gap: 28px;
      background: transparent;
    }

    .stat-icon {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      font-size: 1.7rem;
      background: linear-gradient(135deg, #FFE6B0, #FFC978);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .stat-icon span:first-child {
      font-size: 1.8rem;
      background: none;
      color: #ffdd99;
      text-shadow: 0 0 5px #ffaa44;
    }
    .stat-icon span:last-child {
      font-size: 1.7rem;
      font-weight: bold;
      background: linear-gradient(135deg, #FFF2CC, #FFD966);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .level-badge-icon {
      background: linear-gradient(120deg, #ffb347, #ff7e05);
      padding: 6px 24px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1.3rem;
      color: #1e1a0c;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn-group {
      display: flex;
      gap: 12px;
      background: transparent;
    }

    .icon-btn {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,200,100,0.5);
      border-radius: 50px;
      width: 48px;
      height: 48px;
      font-size: 1.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s linear;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      color: #ffdd99;
    }
    .icon-btn:active {
      transform: scale(0.94);
      background: rgba(255,160,50,0.7);
    }

    /* قوائم منبثقة */
    .menu-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(8, 12, 25, 0.94);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .menu-card {
      background: linear-gradient(145deg, #1e2a3a, #0f1722);
      border-radius: 64px;
      width: 90%;
      max-width: 580px;
      padding: 28px 20px 38px;
      text-align: center;
      border: 1px solid rgba(255,215,0,0.5);
      box-shadow: 0 30px 40px black;
      color: #ffecb3;
    }
    .menu-card h2 {
      font-size: 2rem;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #FFD966, #FFA559);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 12px;
      margin: 20px 0;
      max-height: 300px;
      overflow-y: auto;
      padding: 8px;
    }
    .ball-item {
      background: #2a2f3f;
      border-radius: 60px;
      padding: 8px 5px;
      cursor: pointer;
      transition: 0.1s;
      text-align: center;
      font-weight: bold;
      border: 2px solid #ffb347;
    }
    .ball-item.selected {
      background: #f5a623;
      color: #0a0a0a;
      transform: scale(1.02);
      box-shadow: 0 0 15px gold;
    }
    .menu-btn-large {
      background: #f09d3c;
      font-size: 1.1rem;
      margin: 10px 8px;
      padding: 10px 18px;
      border-radius: 40px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .flex-btns {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 20px;
    }
    .settings-slider {
      margin: 20px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
    }
    input { width: 60%; }
    .coin-display { font-size: 1.2rem; margin-top: 12px; background: #00000077; display: inline-block; padding: 6px 20px; border-radius: 40px; }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="top-stats-bar">
    <div class="stats-group">
      <div class="stat-icon"><span>🏆</span><span id="scoreValue">0</span></div>
      <div class="stat-icon"><span>❤️</span><span id="livesValue">3</span></div>
      <div class="stat-icon"><span>🌟</span><span id="highScoreValue">0</span></div>
      <div class="stat-icon"><span>🪙</span><span id="coinBalanceValue">150</span></div>
    </div>
    <div class="level-badge-icon" id="levelDisplay">🌟 المستوى 1</div>
    <div class="icon-btn-group">
      <div class="icon-btn" id="settingsGameBtn" title="الإعدادات">⚙️</div>
      <div class="icon-btn" id="restartGameBtn" title="إعادة المحاولة">🔄</div>
    </div>
  </div>
  <canvas id="gameCanvas" width="1100" height="620" style="width:100%; height:auto; aspect-ratio:1100/620"></canvas>
</div>

<script>
  (function(){
    // -------------------- CANVAS --------------------
    const canvas = document.getElementById('gameCanvas');
    let ctx = canvas.getContext('2d');
    let width = 1100, height = 620;
    canvas.width = width; canvas.height = height;
    
    // -------------------- عناصر dom --------------------
    const scoreSpan = document.getElementById('scoreValue');
    const livesSpan = document.getElementById('livesValue');
    const highScoreSpan = document.getElementById('highScoreValue');
    const coinBalanceSpan = document.getElementById('coinBalanceValue');
    const levelDisplaySpan = document.getElementById('levelDisplay');
    const settingsGameBtn = document.getElementById('settingsGameBtn');
    const restartGameBtn = document.getElementById('restartGameBtn');
    
    // -------------------- نظام الصوت --------------------
    let audioCtx = null;
    function initAudio() {
      if(audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playSound(type) {
      try {
        if(!audioCtx) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        let freq = 800;
        let duration = 0.12;
        if(type === 'brick') { freq = 523.25; duration = 0.1; gain.gain.value = 0.2; }
        else if(type === 'paddle') { freq = 329.63; duration = 0.08; gain.gain.value = 0.15; }
        else if(type === 'powerup') { freq = 880; duration = 0.2; gain.gain.value = 0.25; }
        else if(type === 'lifeLost') { freq = 220; duration = 0.35; gain.gain.value = 0.3; }
        else if(type === 'levelUp') { freq = 1046.5; duration = 0.4; gain.gain.value = 0.3; }
        else if(type === 'gameOver') { freq = 164.81; duration = 0.8; gain.gain.value = 0.35; }
        else if(type === 'click') { freq = 698.46; duration = 0.07; gain.gain.value = 0.1; }
        osc.frequency.value = freq;
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch(e) { console.log("sound err"); }
    }
    
    // -------------------- متغيرات اللعبة --------------------
    let score = 0;
    let lives = 3;
    let currentLevel = 1;
    let gameRunning = true;
    let levelCompleted = false;
    let gamePaused = false;
    let highScore = localStorage.getItem('blockHighScore') ? parseInt(localStorage.getItem('blockHighScore')) : 0;
    highScoreSpan.innerText = highScore;
    
    // نظام العملات (نقود)
    let coinBalance = parseInt(localStorage.getItem('gameCoins')) || 150;
    coinBalanceSpan.innerText = coinBalance;
    
    function saveCoins() { localStorage.setItem('gameCoins', coinBalance); }
    function addCoins(amount) { coinBalance += amount; coinBalanceSpan.innerText = coinBalance; saveCoins(); }
    function spendCoins(amount) { if(coinBalance>=amount) { coinBalance-=amount; coinBalanceSpan.innerText=coinBalance; saveCoins(); return true; } return false; }
    
    // متجر الكرات (10 كرات)
    const ballSkins = [
      { name: "🔴 كلاسيك", color1: "#ff4d4d", color2: "#ff9999", emoji: "🔴", price: 0 },
      { name: "💙 أزرق جليدي", color1: "#3b82f6", color2: "#90d0ff", emoji: "❄️", price: 150 },
      { name: "💚 زمردي", color1: "#22c55e", color2: "#a3e635", emoji: "💚", price: 150 },
      { name: "🟣 بنفسجي سحري", color1: "#a855f7", color2: "#e9b5ff", emoji: "🔮", price: 150 },
      { name: "🟠 برتقالي ناري", color1: "#f97316", color2: "#ffc27a", emoji: "🔥", price: 150 },
      { name: "🩷 وردي", color1: "#ec4899", color2: "#ffb3d9", emoji: "🌸", price: 150 },
      { name: "⭐ ذهبي أسطوري", color1: "#facc15", color2: "#ffea9e", emoji: "⭐", price: 200 },
      { name: "🌙 فضي غامض", color1: "#94a3b8", color2: "#cbd5e6", emoji: "🌙", price: 150 },
      { name: "🌀 نيلي كوني", color1: "#4f46e5", color2: "#99a9ff", emoji: "🌀", price: 150 },
      { name: "💎 كريستال", color1: "#2dd4bf", color2: "#b2f5ea", emoji: "💎", price: 200 }
    ];
    let currentBallSkin = 0;
    let shopUnlocked = [true, false, false, false, false, false, false, false, false, false];
    // تحميل التذاكر
    let savedUnlocked = localStorage.getItem('ballUnlocks');
    if(savedUnlocked) { try{ let arr = JSON.parse(savedUnlocked); if(arr.length===ballSkins.length) shopUnlocked=arr; }catch(e){} }
    function saveUnlocks() { localStorage.setItem('ballUnlocks', JSON.stringify(shopUnlocked)); }
    
    let gameSpeed = 4.2;
    
    // عناصر اللعبة
    let paddleX = (width - 130) / 2;
    const PADDLE_HEIGHT = 18;
    let originalPaddleW = 130;
    let currentPaddleW = 130;
    let widenEnd = 0;
    let bricks = [];
    let balls = [];
    let powerups = [];
    
    let rows = 5, cols = 10;
    let brickGap = 2;
    let brickWidth = (width / cols) - brickGap;
    let brickHeight = 18;
    let brickOffsetTop = 70;
    let brickOffsetLeft = (width - (cols * (brickWidth + brickGap))) / 2;
    
    function updateUI() {
      scoreSpan.innerText = score;
      livesSpan.innerText = lives;
      if(score > highScore) { highScore = score; localStorage.setItem('blockHighScore', highScore); highScoreSpan.innerText = highScore; }
      coinBalanceSpan.innerText = coinBalance;
    }
    
    function addPoints(pts) {
      score += pts;
      let coinsEarned = Math.floor(pts / 10);
      if(coinsEarned>0) addCoins(coinsEarned);
      updateUI();
    }
    
    function buildLevel(level){
      let newBricks = [];
      for(let r=0; r<rows; r++){
        for(let c=0; c<cols; c++){
          let type = 'normal';
          let health = 1;
          let points = 10;
          let hardChance = level>=2 ? 0.2 + (level*0.02) : 0.1;
          let goldChance = 0.15;
          let rand = Math.random();
          if(rand < hardChance){ type='hard'; health=2; points=25; }
          else if(rand < hardChance+goldChance){ type='gold'; health=1; points=50; }
          if(r===rows-1 && type==='hard') { type='normal'; health=1; points=10; }
          newBricks.push({
            x: brickOffsetLeft + c*(brickWidth+brickGap), y: brickOffsetTop + r*(brickHeight+brickGap),
            w: brickWidth, h: brickHeight, type, health, points
          });
        }
      }
      return newBricks;
    }
    
    function startLevel(level){
      bricks = buildLevel(level);
      balls = [];
      let centerX = width/2;
      balls.push({ x: centerX, y: height-80, dx: (Math.random()>0.5?gameSpeed:-gameSpeed), dy: -gameSpeed, radius: 8 });
      currentPaddleW = originalPaddleW;
      widenEnd = 0;
      powerups = [];
      gameRunning = true;
      levelCompleted = false;
      if(lives<=0) gameRunning = false;
      levelDisplaySpan.innerHTML = `🌟 المستوى ${level}`;
      playSound('levelUp');
    }
    
    function fullReset(keepStats=false){
      if(!keepStats) { score = 0; lives = 3; currentLevel = 1; }
      else { if(lives<=0) lives=3; }
      updateUI();
      startLevel(currentLevel);
      gameRunning = true;
      levelCompleted = false;
      gamePaused = false;
      closeAllMenus();
    }
    
    function resetToMenu(){
      fullReset();
      showStartMenu();
    }
    
    function loseLife(){
      if(!gameRunning) return;
      playSound('lifeLost');
      lives--;
      updateUI();
      if(lives <= 0){ 
        gameRunning = false; 
        levelCompleted=false;
        playSound('gameOver');
        return; 
      }
      balls = [];
      let mid = paddleX + currentPaddleW/2;
      balls.push({ x: mid, y: paddleY-12, dx: (Math.random()>0.5?gameSpeed:-gameSpeed), dy: -gameSpeed, radius: 8 });
      powerups = [];
    }
    
    function handleCollisions(){
      for(let i=0; i<balls.length; i++){
        const b = balls[i];
        for(let j=0; j<bricks.length; j++){
          const br = bricks[j];
          if(b.x+b.radius > br.x && b.x-b.radius < br.x+br.w && b.y+b.radius > br.y && b.y-b.radius < br.y+br.h){
            let overlapLeft = (b.x+b.radius - br.x);
            let overlapRight = (br.x+br.w - (b.x-b.radius));
            let overlapTop = (b.y+b.radius - br.y);
            let overlapBottom = (br.y+br.h - (b.y-b.radius));
            let min = Math.min(overlapLeft,overlapRight,overlapTop,overlapBottom);
            if(min===overlapTop || min===overlapBottom) b.dy = -b.dy;
            else b.dx = -b.dx;
            
            if(br.type === 'hard'){
              br.health--;
              if(br.health<=0){
                addPoints(br.points);
                playSound('brick');
                if(Math.random()<0.3) spawnPowerup(br.x+br.w/2, br.y+br.h/2);
                bricks.splice(j,1);
              } else { playSound('brick'); }
            } else {
              addPoints(br.points);
              playSound('brick');
              if(br.type === 'gold'){ addPoints(30); spawnPowerup(br.x+br.w/2, br.y+br.h/2); }
              else if(Math.random()<0.2) spawnPowerup(br.x+br.w/2, br.y+br.h/2);
              bricks.splice(j,1);
            }
            break;
          }
        }
      }
    }
    
    function spawnPowerup(x,y){
      const types = ['extraBall', 'expandPaddle', 'extraLife', 'megaScore'];
      let type = types[Math.floor(Math.random()*types.length)];
      powerups.push({ x: x-12, y: y, w:24, h:24, type: type });
    }
    
    function applyPowerup(type){
      playSound('powerup');
      if(type === 'extraBall' && balls.length<6){
        let ref = balls[0];
        balls.push({ x: paddleX+currentPaddleW/2, y: paddleY-12, dx: (ref.dx>0?ref.dx+0.8:ref.dx-0.8), dy: -ref.dy, radius:8 });
      } else if(type === 'expandPaddle'){
        widenEnd = performance.now() + 7000;
      } else if(type === 'extraLife'){ if(lives<6) lives++; updateUI(); }
      else if(type === 'megaScore') addPoints(100);
    }
    
    function getPaddleWidth(){
      if(widenEnd > 0 && performance.now() < widenEnd) return Math.min(originalPaddleW+70, originalPaddleW*1.6);
      return originalPaddleW;
    }
    
    const paddleY = height - PADDLE_HEIGHT - 12;
    
    function updatePhysics(){
      if(!gameRunning || gamePaused) return;
      let curPaddleW = getPaddleWidth();
      for(let i=0;i<balls.length;i++){
        let b = balls[i];
        b.x += b.dx; b.y += b.dy;
        if(b.x+b.radius>width){ b.x=width-b.radius; b.dx=-b.dx; playSound('paddle'); }
        if(b.x-b.radius<0){ b.x=b.radius; b.dx=-b.dx; playSound('paddle'); }
        if(b.y-b.radius<0){ b.y=b.radius; b.dy=-b.dy; playSound('paddle'); }
        if(b.y+b.radius>height){
          balls.splice(i,1); i--;
          if(balls.length===0) loseLife();
          continue;
        }
        if(b.y+b.radius>=paddleY && b.y-b.radius<=paddleY+PADDLE_HEIGHT && b.x+b.radius>paddleX && b.x-b.radius<paddleX+curPaddleW){
          let hitPos = (b.x - paddleX)/curPaddleW;
          let angle = (hitPos-0.5)*1.3;
          let speed = Math.hypot(b.dx,b.dy);
          let dirX = Math.sin(angle);
          let dirY = -Math.cos(angle);
          let norm = Math.hypot(dirX,dirY);
          if(norm>0){ dirX/=norm; dirY/=norm; }
          b.dx = dirX * speed;
          b.dy = dirY * speed;
          if(Math.abs(b.dx)<1.2) b.dx = b.dx>0?1.7:-1.7;
          b.y = paddleY - b.radius;
          playSound('paddle');
        }
      }
    }
    
    function updatePowerups(){
      for(let i=0;i<powerups.length;i++){
        let p = powerups[i];
        p.y += 4;
        let curW = getPaddleWidth();
        if(p.y+p.h>=paddleY && p.y<=paddleY+PADDLE_HEIGHT && p.x+p.w>paddleX && p.x<paddleX+curW){
          applyPowerup(p.type);
          powerups.splice(i,1); i--;
        } else if(p.y>height){ powerups.splice(i,1); i--; }
      }
    }
    
    function checkLevelComplete(){
      if(bricks.length===0 && gameRunning && !levelCompleted){
        levelCompleted = true;
        gameRunning = false;
        playSound('levelUp');
        currentLevel++;
        if(currentLevel > 6){
          levelDisplaySpan.innerHTML = "🎉 انتصار عظيم 🎉";
          setTimeout(()=>{ fullReset(); }, 1800);
          return;
        }
        startLevel(currentLevel);
        gameRunning=true;
        levelCompleted=false;
        updateUI();
      }
    }
    
    // -------------------- القوائم والواجهات --------------------
    let activeMenu = null;
    function closeAllMenus(){
      if(activeMenu && activeMenu.parentNode) document.body.removeChild(activeMenu);
      activeMenu = null;
      gamePaused = false;
      if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    function showStartMenu(){
      if(activeMenu) closeAllMenus();
      gamePaused = true;
      initAudio();
      const div = document.createElement('div'); div.className='menu-overlay';
      div.innerHTML = `
        <div class="menu-card">
          <h2>🎯 أركيد البلوكات</h2>
          <div style="font-size:1rem; margin:5px">🎧 أصوات | 10 كرات | متجر حقيقي</div>
          <div class="flex-btns">
            <button class="menu-btn-large" id="startPlayBtn">🎮 بدء اللعب</button>
            <button class="menu-btn-large" id="shopMenuBtn">🛒 المتجر</button>
            <button class="menu-btn-large" id="settingsMenuBtn">⚙️ الإعدادات</button>
            <button class="menu-btn-large" id="exitGameBtn">🚪 خروج</button>
          </div>
          <div class="coin-display">💰 عملاتك: ${coinBalance} 🪙</div>
        </div>
      `;
      document.body.appendChild(div);
      activeMenu = div;
      div.querySelector('#startPlayBtn').onclick = () => { playSound('click'); closeAllMenus(); gamePaused=false; if(!gameRunning && lives<=0) fullReset(); else gamePaused=false; };
      div.querySelector('#shopMenuBtn').onclick = () => { playSound('click'); showShopMenu(); };
      div.querySelector('#settingsMenuBtn').onclick = () => { playSound('click'); showSettingsMenu(); };
      div.querySelector('#exitGameBtn').onclick = () => { playSound('click'); alert("شكراً للعب! ✨"); closeAllMenus(); };
    }
    
    function showShopMenu(){
      if(activeMenu) closeAllMenus();
      gamePaused = true;
      const div = document.createElement('div'); div.className='menu-overlay';
      let ballsHtml = `<div class="shop-grid">`;
      ballSkins.forEach((skin, idx)=>{
        let unlocked = shopUnlocked[idx] || idx===0;
        let selectedMark = (currentBallSkin===idx) ? ' ✅' : '';
        ballsHtml += `<div class="ball-item ${currentBallSkin===idx ? 'selected' : ''}" data-index="${idx}">
          <div style="font-size:28px">${skin.emoji}</div>
          <div>${skin.name}${selectedMark}</div>
          <div style="font-size:12px">${unlocked ? (idx===0?'حر':'مملوك') : `💰 ${skin.price} 🪙`}</div>
        </div>`;
      });
      ballsHtml += `</div><div class="flex-btns"><button class="menu-btn-large" id="closeShopBtn">🔙 رجوع</button></div>`;
      div.innerHTML = `<div class="menu-card"><h2>🛍️ المتجر السحري</h2>${ballsHtml}<div class="coin-display">💰 رصيدك: ${coinBalance} 🪙</div></div>`;
      document.body.appendChild(div);
      activeMenu = div;
      const items = div.querySelectorAll('.ball-item');
      items.forEach(el=>{
        el.addEventListener('click',()=>{
          let idx = parseInt(el.dataset.index);
          if(shopUnlocked[idx] || idx===0){
            currentBallSkin = idx;
            playSound('click');
            showShopMenu();
          } else {
            let price = ballSkins[idx].price;
            if(coinBalance >= price){
              spendCoins(price);
              shopUnlocked[idx]=true;
              saveUnlocks();
              currentBallSkin = idx;
              playSound('powerup');
              showShopMenu();
            } else { playSound('lifeLost'); alert("عملات غير كافية! العب لربح المزيد 🪙"); }
          }
        });
      });
      div.querySelector('#closeShopBtn').onclick = () => { playSound('click'); showStartMenu(); };
    }
    
    function showSettingsMenu(){
      if(activeMenu) closeAllMenus();
      gamePaused = true;
      const div = document.createElement('div'); div.className='menu-overlay';
      div.innerHTML = `<div class="menu-card">
        <h2>⚙️ الإعدادات</h2>
        <div class="settings-slider"><span>🐉 سرعة اللعب</span><input type="range" id="speedSlider" min="3" max="6.2" step="0.2" value="${gameSpeed}"></div>
        <div class="flex-btns">
          <button class="menu-btn-large" id="saveSettingsBtn">💾 حفظ</button>
          <button class="menu-btn-large" id="resetHighScoreBtn">🏆 إعادة تعيين</button>
          <button class="menu-btn-large" id="homeFromSettingsBtn">🏠 العودة للمنزل</button>
        </div>
      </div>`;
      document.body.appendChild(div);
      activeMenu = div;
      let slider = div.querySelector('#speedSlider');
      slider.oninput = (e) => { gameSpeed = parseFloat(e.target.value); if(balls[0]) { balls[0].dx = gameSpeed * (balls[0].dx>0?1:-1); balls[0].dy = -gameSpeed; } };
      div.querySelector('#saveSettingsBtn').onclick = () => { playSound('click'); closeAllMenus(); gamePaused=false; };
      div.querySelector('#resetHighScoreBtn').onclick = () => { playSound('click'); highScore=0; localStorage.setItem('blockHighScore',0); highScoreSpan.innerText=0; alert("أعلى نتيجة تمت إعادة تعيينها"); };
      div.querySelector('#homeFromSettingsBtn').onclick = () => { playSound('click'); closeAllMenus(); showStartMenu(); };
    }
    
    // أيقونات الاعدادات وإعادة المحاولة
    settingsGameBtn.onclick = () => { if(activeMenu) closeAllMenus(); gamePaused = true; showSettingsMenu(); };
    restartGameBtn.onclick = () => { playSound('click'); fullReset(); gamePaused=false; closeAllMenus(); };
    
    function handleMove(clientX){
      let rect = canvas.getBoundingClientRect();
      let scaleX = canvas.width / rect.width;
      let mouseX = (clientX - rect.left) * scaleX;
      let newX = mouseX - getPaddleWidth()/2;
      newX = Math.min(Math.max(newX,0), width - getPaddleWidth());
      paddleX = newX;
    }
    canvas.addEventListener('mousemove',(e)=>{ if(!gamePaused && gameRunning) handleMove(e.clientX); });
    canvas.addEventListener('touchmove',(e)=>{ e.preventDefault(); if(!gamePaused && gameRunning) handleMove(e.touches[0].clientX); });
    canvas.addEventListener('touchstart',(e)=>e.preventDefault());
    
    // رسم + أيقونات الهزيمة في منتصف الشاشة
    function draw(){
      ctx.clearRect(0,0,width,height);
      let grad = ctx.createLinearGradient(0,0,0,height);
      grad.addColorStop(0,'#0a0f1c'); grad.addColorStop(1,'#131a2c');
      ctx.fillStyle=grad; ctx.fillRect(0,0,width,height);
      for(let b of bricks){
        let gradBrick = ctx.createLinearGradient(b.x,b.y,b.x+b.w,b.y+b.h);
        if(b.type==='normal') gradBrick.addColorStop(0,'#3b82f6'), gradBrick.addColorStop(1,'#1e3a8a');
        else if(b.type==='hard') gradBrick.addColorStop(0,'#dd7631'), gradBrick.addColorStop(1,'#9b4a1a');
        else gradBrick.addColorStop(0,'#fbbf24'), gradBrick.addColorStop(1,'#d97706');
        ctx.fillStyle=gradBrick; ctx.shadowBlur=6; ctx.fillRect(b.x,b.y,b.w,b.h);
        if(b.type==='hard'){ ctx.fillStyle='#fff0b5'; ctx.font='bold 12px system-ui'; ctx.fillText(`${b.health}❤️`,b.x+5,b.y+14); }
        if(b.type==='gold'){ ctx.fillStyle='#ffdf80'; ctx.font='18px monospace'; ctx.fillText("⭐",b.x+b.w/2-6,b.y+14); }
      }
      ctx.shadowBlur=0;
      let pw = getPaddleWidth();
      ctx.fillStyle='#ffaa55'; ctx.shadowBlur=8; ctx.beginPath(); ctx.roundRect(paddleX,paddleY,pw,PADDLE_HEIGHT,12); ctx.fill();
      let skin = ballSkins[currentBallSkin];
      for(let ball of balls){
        ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);
        let grd = ctx.createRadialGradient(ball.x-3,ball.y-3,2,ball.x,ball.y,ball.radius);
        grd.addColorStop(0,skin.color1); grd.addColorStop(1,skin.color2);
        ctx.fillStyle=grd; ctx.fill();
        ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.radius-2,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,200,0.9)'; ctx.fill();
      }
      for(let p of powerups){
        ctx.fillStyle='#dd88ff'; ctx.fillRect(p.x,p.y,p.w,p.h);
        ctx.fillStyle='white'; ctx.font="bold 20px sans-serif";
        if(p.type==='extraBall') ctx.fillText("➕",p.x+4,p.y+18);
        else if(p.type==='expandPaddle') ctx.fillText("⬌",p.x+4,p.y+18);
        else if(p.type==='extraLife') ctx.fillText("❤️",p.x+4,p.y+18);
        else ctx.fillText("💎",p.x+4,p.y+18);
      }
      
      // عند الهزيمة: عرض أيقونات إعادة المحاولة والرجوع للمنزل
      if(lives <= 0 && !gameRunning){
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.fillRect(0,0,width,height);
        ctx.font = "bold 38px system-ui";
        ctx.fillStyle = "#ffc285";
        ctx.fillText("💀 هزيمة", width/2-95, height/2-70);
        // خلفية الأزرار
        ctx.shadowBlur = 0;
        // زر إعادة المحاولة (أيقونة)
        let btnX1 = width/2 - 90;
        let btnY1 = height/2;
        let btnW = 70, btnH = 70;
        ctx.fillStyle = "#ffaa44cc";
        ctx.beginPath(); ctx.roundRect(btnX1, btnY1, btnW, btnH, 20); ctx.fill();
        ctx.font = "44px system-ui";
        ctx.fillStyle = "#1e1a0c";
        ctx.fillText("🔄", btnX1+18, btnY1+52);
        // زر القائمة الرئيسية
        let btnX2 = width/2 + 20;
        ctx.fillStyle = "#44aaffcc";
        ctx.beginPath(); ctx.roundRect(btnX2, btnY1, btnW, btnH, 20); ctx.fill();
        ctx.fillStyle = "#1e1a0c";
        ctx.fillText("🏠", btnX2+18, btnY1+52);
        
        // معالجة النقر على الأيقونات (كشف المنطقة)
        const checkDefeatButtons = (e) => {
          let rect = canvas.getBoundingClientRect();
          let scaleX = canvas.width / rect.width;
          let scaleY = canvas.height / rect.height;
          let mouseCanvasX = (e.clientX - rect.left) * scaleX;
          let mouseCanvasY = (e.clientY - rect.top) * scaleY;
          if(mouseCanvasX > btnX1 && mouseCanvasX < btnX1+btnW && mouseCanvasY > btnY1 && mouseCanvasY < btnY1+btnH){
            playSound('click');
            fullReset();
            canvas.removeEventListener('click', checkDefeatButtons);
            return;
          }
          if(mouseCanvasX > btnX2 && mouseCanvasX < btnX2+btnW && mouseCanvasY > btnY1 && mouseCanvasY < btnY1+btnH){
            playSound('click');
            fullReset();
            showStartMenu();
            canvas.removeEventListener('click', checkDefeatButtons);
            return;
          }
        };
        if(lives<=0 && !gameRunning && !gamePaused){
          canvas.addEventListener('click', checkDefeatButtons);
          window._defeatListener = checkDefeatButtons;
        } else if(window._defeatListener) { canvas.removeEventListener('click', window._defeatListener); delete window._defeatListener; }
      } else {
        if(window._defeatListener) { canvas.removeEventListener('click', window._defeatListener); delete window._defeatListener; }
      }
    }
    
    function updateGame(){
      if(!gameRunning || gamePaused) return;
      updatePhysics();
      handleCollisions();
      updatePowerups();
      checkLevelComplete();
    }
    function animationLoop(){
      updateGame();
      draw();
      requestAnimationFrame(animationLoop);
    }
    
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
        if (w < 2*r) r = w/2; if (h < 2*r) r = h/2;
        this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
        this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
        this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y); return this;
      };
    }
    
    function init(){
      fullReset();
      showStartMenu();
      animationLoop();
      document.body.addEventListener('click', function once(){ if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }, { once: true });
    }
    init();
  })();
</script>
</body>
